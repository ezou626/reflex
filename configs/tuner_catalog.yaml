version: 1
tuners:
  - id: sysctl_vm_swappiness
    category: vm
    description: Tendency to reclaim anonymous pages vs page cache
    scope: runtime_sysctl
    sysctl: vm.swappiness
    kind: int
    enabled: true
    min_value: 0
    max_value: 100
    step: 5
  - id: sysctl_vm_watermark_scale_factor
    category: vm
    description: How aggressively kswapd wakes to reclaim memory before hitting watermarks
    scope: runtime_sysctl
    sysctl: vm.watermark_scale_factor
    kind: int
    enabled: true
    min_value: 10
    max_value: 500
    step: 10
  - id: sysctl_vm_min_free_kbytes
    category: vm
    description: Minimum free memory the kernel keeps in reserve to avoid OOM
    scope: runtime_sysctl
    sysctl: vm.min_free_kbytes
    kind: int
    enabled: true
    min_value: 16384
    max_value: 1048576
    step: 8192
  - id: sysctl_kernel_sched_cfs_bandwidth_slice_us
    category: cpu
    description: CFS scheduling time-slice length; smaller reduces latency, larger improves throughput
    scope: runtime_sysctl
    sysctl: kernel.sched_cfs_bandwidth_slice_us
    kind: int
    enabled: true
    min_value: 1000
    max_value: 100000
    step: 1000
  - id: sysctl_kernel_sched_autogroup_enabled
    category: cpu
    description: Group tasks by session for fairer scheduling; off favours batch throughput
    scope: runtime_sysctl
    sysctl: kernel.sched_autogroup_enabled
    kind: int
    enabled: true
    min_value: 0
    max_value: 1
    step: 1
  - id: sysctl_vm_vfs_cache_pressure
    category: vm
    description: Tendency to reclaim inode/dentry cache vs swap
    scope: runtime_sysctl
    sysctl: vm.vfs_cache_pressure
    kind: int
    enabled: true
    min_value: 50
    max_value: 1000
    step: 10
  - id: sysctl_vm_dirty_expire_centisecs
    category: vm
    description: Age (centisecs) at which dirty pages are eligible for writeback; lower forces more frequent flushes
    scope: runtime_sysctl
    sysctl: vm.dirty_expire_centisecs
    kind: int
    enabled: true
    min_value: 100
    max_value: 6000
    step: 100
  - id: sysctl_vm_dirty_writeback_centisecs
    category: vm
    description: Interval (centisecs) between pdflush/writeback wakeups; 0 disables periodic writeback
    scope: runtime_sysctl
    sysctl: vm.dirty_writeback_centisecs
    kind: int
    enabled: true
    min_value: 100
    max_value: 1500
    step: 100
  - id: sysctl_vm_page_cluster
    category: vm
    description: Log2 of pages read together from swap; 0=one page, 3=eight pages
    scope: runtime_sysctl
    sysctl: vm.page-cluster
    kind: int
    enabled: true
    min_value: 0
    max_value: 5
    step: 1
  - id: sysctl_vm_compaction_proactiveness
    category: vm
    description: Aggressiveness of proactive memory compaction (0=off, 100=max); reduces allocation latency spikes
    scope: runtime_sysctl
    sysctl: vm.compaction_proactiveness
    kind: int
    enabled: true
    min_value: 0
    max_value: 100
    step: 10
  - id: sysctl_vm_dirty_bytes
    category: vm
    description: Absolute dirty memory threshold for synchronous writeback; overrides dirty_ratio when non-zero
    scope: runtime_sysctl
    sysctl: vm.dirty_bytes
    kind: int
    enabled: true
    min_value: 8192
    max_value: 536870912
    step: 8388608
  - id: sysctl_vm_extfrag_threshold
    category: vm
    description: Fragmentation score above which allocator prefers compaction over reclaim (0=always compact, 1000=always reclaim)
    scope: runtime_sysctl
    sysctl: vm.extfrag_threshold
    kind: int
    enabled: true
    min_value: 0
    max_value: 1000
    step: 50
  - id: sysctl_vm_max_map_count
    category: vm
    description: Max VMAs per process; raise for JVM, Elasticsearch, or large mmap workloads
    scope: runtime_sysctl
    sysctl: vm.max_map_count
    kind: int
    enabled: true
    min_value: 65530
    max_value: 524288
    step: 65536
  - id: sysctl_vm_overcommit_memory
    category: vm
    description: Overcommit policy; 0=heuristic, 1=always allow, 2=strict limit via overcommit_kbytes
    scope: runtime_sysctl
    sysctl: vm.overcommit_memory
    kind: int
    enabled: true
    min_value: 0
    max_value: 2
    step: 1
  - id: sysctl_vm_overcommit_kbytes
    category: vm
    description: Absolute kbytes added to RAM for overcommit limit; only effective when vm.overcommit_memory=2
    scope: runtime_sysctl
    sysctl: vm.overcommit_kbytes
    kind: int
    enabled: true
    min_value: 0
    max_value: 8388608
    step: 262144
  - id: sysctl_net_core_somaxconn
    category: net
    description: Maximum listen backlog per socket
    scope: runtime_sysctl
    sysctl: net.core.somaxconn
    kind: int
    enabled: true
    min_value: 128
    max_value: 4096
    step: 128
  - id: sysctl_net_core_netdev_max_backlog
    category: net
    description: Max packets queued in the NIC receive ring before being processed by the kernel
    scope: runtime_sysctl
    sysctl: net.core.netdev_max_backlog
    kind: int
    enabled: true
    min_value: 1000
    max_value: 10000
    step: 1000
  - id: sysctl_net_core_netdev_budget
    category: net
    description: Max packets processed per NAPI softirq poll cycle; higher reduces latency under burst at cost of CPU
    scope: runtime_sysctl
    sysctl: net.core.netdev_budget
    kind: int
    enabled: true
    min_value: 100
    max_value: 600
    step: 50
  - id: sysctl_net_core_rmem_max
    category: net
    description: Maximum socket receive buffer size in bytes
    scope: runtime_sysctl
    sysctl: net.core.rmem_max
    kind: int
    enabled: true
    min_value: 212992
    max_value: 16777216
    step: 1048576
  - id: sysctl_net_core_wmem_max
    category: net
    description: Maximum socket send buffer size in bytes
    scope: runtime_sysctl
    sysctl: net.core.wmem_max
    kind: int
    enabled: true
    min_value: 212992
    max_value: 16777216
    step: 1048576
  - id: sysctl_net_ipv4_tcp_fin_timeout
    category: net
    description: Seconds a FIN-WAIT-2 socket is held before teardown; lower reclaims ports faster under high connection churn
    scope: runtime_sysctl
    sysctl: net.ipv4.tcp_fin_timeout
    kind: int
    enabled: true
    min_value: 10
    max_value: 120
    step: 5
  - id: sysctl_net_ipv4_tcp_max_syn_backlog
    category: net
    description: Max half-open connections queued per socket before SYN packets are dropped
    scope: runtime_sysctl
    sysctl: net.ipv4.tcp_max_syn_backlog
    kind: int
    enabled: true
    min_value: 512
    max_value: 4096
    step: 256
  - id: sysctl_net_ipv4_tcp_notsent_lowat
    category: net
    description: Max unsent bytes allowed in TCP send queue per socket; lower reduces latency under send backpressure
    scope: runtime_sysctl
    sysctl: net.ipv4.tcp_notsent_lowat
    kind: int
    enabled: true
    min_value: 16384
    max_value: 2097152
    step: 65536
  - id: sysctl_net_ipv4_tcp_tw_reuse
    category: net
    description: Reuse TIME_WAIT sockets for new outgoing connections; 0=off, 1=enabled globally; reduces port exhaustion under high connection churn
    scope: runtime_sysctl
    sysctl: net.ipv4.tcp_tw_reuse
    kind: int
    enabled: true
    min_value: 0
    max_value: 1
    step: 1
  - id: sysctl_net_ipv4_tcp_slow_start_after_idle
    category: net
    description: Reset TCP congestion window after idle when 1; set to 0 for persistent high-throughput connections (HTTP/2, gRPC, DB pools)
    scope: runtime_sysctl
    sysctl: net.ipv4.tcp_slow_start_after_idle
    kind: int
    enabled: true
    min_value: 0
    max_value: 1
    step: 1
  - id: sysctl_net_ipv4_tcp_retries2
    category: net
    description: TCP retransmit attempts before dropping a connection; lower for faster dead-peer detection, default 15 (~13-30 min holdtime)
    scope: runtime_sysctl
    sysctl: net.ipv4.tcp_retries2
    kind: int
    enabled: true
    min_value: 8
    max_value: 15
    step: 1
    