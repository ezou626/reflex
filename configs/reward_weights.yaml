# Reward weights for tune_experiment.py.
# Each weight is applied to a normalized [0, 1] value.
# Positive = more is better; negative = less is better.
mem_avail:       0.35   # host_mem_available_ratio
rq_latency:     -0.30   # rq_latency_p95_us / 10000
direct_reclaim: -0.20   # direct_reclaim_rate_per_sec / 100
cpu_busy:       -0.10   # host_cpu_busy_ratio
dirty:          -0.05   # host_dirty_kb / 200000
