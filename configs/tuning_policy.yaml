# Scalar values are parsed by daemon/decision_engine.py.
compare_metrics: context_switch_rate_per_sec,syscall_error_rate,rq_latency_p95_us,rq_latency_p99_us,host_cpu_busy_ratio,host_mem_available_ratio
min_windows_before_action: 3
cooldown_windows: 2
evaluate_after_windows: 3
regression_threshold: 0.05
improvement_threshold: 0.02
